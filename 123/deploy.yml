name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: 123/package-lock.json  # 若沒有 lock 可刪這行

      # 進到子資料夾 123 裡執行
      - run: npm ci || npm i
        working-directory: 123
      - run: npm run build
        working-directory: 123

      # 上傳 build 產物（子資料夾的 dist）
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 123/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
